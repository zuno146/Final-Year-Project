<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales | Shopex</title>
    <style>
        /* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f6f9;
}

/* Navbar */

.navbar{
    width:100%;
    height:75px;
    background:#1f2937;
    color:white;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 70px;

    box-shadow:0 3px 12px rgba(0,0,0,0.15);
}

.navbar h1{
    font-size:30px;
    font-weight:700;
    color:#4ade80;
    letter-spacing:1px;
}

.nav-links{
    display:flex;
    gap:30px;
}

.navbar a{
    text-decoration:none;
    color:white;
    font-size:17px;
    font-weight:500;
    padding:8px 16px;
    border-radius:6px;
    transition:.3s;
}

.navbar a:hover{
    background:#4ade80;
    color:#1f2937;
}

.navbar a:active{
    transform:scale(.95);
}

/* Responsive */

@media(max-width:768px){

    .navbar{
        flex-direction:column;
        height:auto;
        padding:20px;
        gap:15px;
    }

.navbar a{
    text-decoration:none;
    color:white;
    font-size:17px;
    font-weight:500;
    padding:8px 16px;
    border-radius:6px;
    transition:.3s;
}
}
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg, #F8FAFC 0%, #EEF6FF 100%);
}

.container{
    width:80%;
    margin:40px auto;
}

h1{
    text-align:center;
    color:#1f2937;
}

#date{
    text-align:center;
    color:#16a34a;
    margin:20px 0 40px;
}

.input-box{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

input{
    width:220px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    background:#22c55e;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#16a34a;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,
td{
    border:1px solid #ddd;
    padding:15px;
    text-align:center;
}

th{
    background:#1f2937;
    color:white;
}

tfoot th{
    background:#22c55e;
}
.footer{
    background:#1f2937;
    color:#ffffff;
    text-align:center;
    padding:20px;
    margin-top:50px;
    font-size:16px;
    border-top:3px solid #22c55e;
}

.footer span{
    color:#22c55e;
    font-weight:600;
}
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Shopex</h1>
        <div>
        <a href="index.html">Home</a>
        <a href="sales.html">Sales</a>
        <a href="expense.html">Expense</a>
        <a href="profit.html">Profit</a>
        <a href="loan.html">Loan</a>
        <a href="purchase.html">Purchase</a>
        <a href="calculator.html" target="_blank">Calculator</a>
        </div>
    </div>
    <div class="container">

        <h1>Sales Record</h1>

        <h3 id="date"></h3>

        <div class="input-box">

            <input
                type="text"
                id="name"
                placeholder="Sales Name">

            <input
                type="number"
                id="amount"
                placeholder="Sale Amount">

            <button onclick="addSale()">
                Add Sale
            </button>
            <button onclick="location.reload()">
    Refresh
</button>
<button onclick="clearSales()">
    Clear Sales
</button>
        </div>

        <table>

            <thead>

                <tr>
                    <th>Name</th>
                    <th>Amount (Rs)</th>
                </tr>

            </thead>

            <tbody id="tableBody">

            </tbody>

            <tfoot>

                <tr>
                    <th>Total</th>
                    <th id="total">0</th>
                </tr>

            </tfoot>

        </table>

    </div>

<footer class="footer">
    <p>Created with ❤️ by <span>Zunaira Khan</span></p>
</footer>
<script src="sales.js"></script>
</body>
</html>
