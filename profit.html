<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profit | Shopex</title>

<style>

/* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f6f9;
}

/* Navbar */

.navbar{
    width:100%;
    height:75px;
    background:#1f2937;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 70px;
}

.navbar h1{
    color:#4ade80;
    margin-top: 20px;
}

.navbar a{
    text-decoration:none;
    color:white;
    margin-left:25px;
    font-weight:500;
}

.navbar a:hover{
    color:#4ade80;
}

/* Container */

.container{

    width:600px;
    margin:50px auto;
    background:linear-gradient(135deg, #F8FAFC 0%, #EEF6FF 100%);
    border-radius:10px;
    padding:40px;
    box-shadow:0 0 15px rgba(0,0,0,.15);

}

h1{

    text-align:center;
    color:#1f2937;
    margin-bottom:20px;

}

#date{

    text-align:center;
    color:#16a34a;
    margin-bottom:35px;

}

.box{

    display:flex;
    justify-content:space-between;
    margin:20px 0;
    padding:15px;
    background:#f4f6f9;
    border-radius:8px;
    font-size:20px;

}

#result{

    text-align:center;
    margin-top:40px;
    font-size:32px;
    font-weight:bold;

}

.footer{
    background:#1f2937;
    color:white;
    text-align:center;
    padding:20px;
        border-top:3px solid #22c55e;
    margin-top:60px;
}

.footer span{
    color:#4ade80;

}

</style>

</head>

<body>

<div class="navbar">

    <h1>Shopex</h1>

    <div>

        <a href="index.html">Home</a>
        <a href="sales.html">Sales</a>
        <a href="expense.html">Expense</a>
        <a href="profit.html">Profit</a>
        <a href="loan.html">Loan</a>
        <a href="purchase.html">Purchase</a>
        <a href="calculator.html" target="_blank">Calculator</a>
    </div>

</div>

<div class="container">

    <h1>Profit Report</h1>

    <h3 id="date"></h3>

    <div class="box">

        <span>Total Sales</span>

        <span id="sales">Rs.0</span>

    </div>

    <div class="box">

        <span>Total Expenses</span>

        <span id="expenses">Rs.0</span>

    </div>

    <h2 id="result"></h2>

</div>

<footer class="footer">

    Made with ❤️ by <span>Zunaira Khan</span>

</footer>

<script src="profit.js"></script>
