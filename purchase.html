<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase</title>
    <style>
        .navbar{
    width:100%;
    height:75px;
    background:#1f2937;
    color:white;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 70px;

    box-shadow:0 3px 12px rgba(0,0,0,0.15);
}

.navbar h1{
    font-size:30px;
    font-weight:700;
    color:#4ade80;
    letter-spacing:1px;
    margin-top: 30px;
}

.nav-links{
    display:flex;
    gap:30px;
}

.navbar a{
    text-decoration:none;
    color:white;
    font-size:17px;
    font-weight:500;
    padding:8px 16px;
    border-radius:6px;
    transition:.3s;
}

.navbar a:hover{
    background:#4ade80;
    color:#1f2937;
}

.navbar a:active{
    transform:scale(.95);
}

/* Responsive */

/* ================= RESPONSIVE ================= */

@media (max-width:768px){

    .navbar{
        flex-direction:column;
        height:auto;
        padding:20px;
        gap:15px;
    }

    .navbar div{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:10px;
    }

    .navbar h1{
        margin-top:0;
    }

    .container{
        width:90%;
        max-width:550px;
        margin:30px auto;
        padding:25px;
    }

    label{
        margin-left:0;
        font-size:18px;
    }

}

@media (max-width:500px){

    .container{
        width:95%;
        padding:20px;
    }

    h1{
        font-size:28px;
    }

    .btn-group{
        flex-direction:column;
    }

    .btn-group button,
    .btn-group .btn{
        width:100%;
    }

}

       *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;

    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg, #F8FAFC 0%, #EEF6FF 100%);
}

.container{
    width:550px;
    background:#fff;
    padding:40px;
    border-radius:18px;
    border:1px solid #E5E7EB;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    margin-left: 500px;
    margin-top: 30px;
}

h1{
    text-align:center;
    color:#1F2937;
    margin-bottom:35px;
    font-size:34px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#374151;
    font-weight:600;
    margin-left: 180px;
    font-size: 30px;
}

input,
select{
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border:2px solid #E5E7EB;
    border-radius:10px;
    font-size:15px;
    transition:.3s;
    background:#FAFAFA;
}

input:focus,
select:focus{
    outline:none;
    border-color:#22C55E;
    background:#fff;
}
.btn-group{
    display:flex;
    gap:15px;      /* Space between buttons */
    margin-top:20px;
}

.btn-group .btn,
.btn-group button{
    flex:1;
    text-align:center;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#22C55E;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    text-decoration:none;
    transition:.3s;
}

.btn-group .btn:hover,
.btn-group button:hover{
    background:#16A34A;
    transform:translateY(-2px);
}
.footer{
    background:#1f2937;
    color:#ffffff;
    text-align:center;
    padding:20px;
    margin-top:50px;
    font-size:16px;
    border-top:3px solid #22c55e;
}

.footer span{
    color:#22c55e;
    font-weight:600;
}
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Shopex</h1>
        <div>
        
        <a href="index.html">Home</a>
        <a href="sales.html">Sales</a>
        <a href="expense.html">Expense</a>
        <a href="profit.html">Profit</a>
        <a href="loan.html">Loan</a>
        <a href="purchase.html">Purchase</a>
        <a href="calculator.html" target="_blank">Calculator</a>
        </div>
    </div>
<div class="container">

    <h1>Purchase Form</h1>

    <label for="vendor">Vendor</label>
    <select id="vendor">
        <option>Select Mall</option>
        <option>Lucky One Mall</option>
        <option>Chase Value</option>
        <option>Bin Hashim Mall</option>
    </select>

    <input type="text" id="name" placeholder="Enter Your Name">
    <input type="text" id="shop" placeholder="Enter Your Shop Name">
    <input type="text" id="address" placeholder="Enter Your Shop Address">
    <input type="text" id="item" placeholder="Enter Your Item Name">

<div class="btn-group">
    <a href="add.html" class="btn" target="_blank">Add Vendor</a>
    <button id="sendBtn">Send Message</button>
</div>

</div>

<footer class="footer">
    <p>Created with ❤️ by <span>Zunaira Khan</span></p>
</footer>
<script src="purchace.js"></script>
</body>

</body>
</html>
